# Redirect all HTTP traffic to HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2  on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    root  /var/www/app/public;
    index index.php;

    # Route all requests through Symfony's front controller
    location / {
        try_files $uri /index.php$is_args$args;
    }

    # PHP-FPM — only index.php is the entry point
    location ~ ^/index\.php(/|$) {
        fastcgi_pass phpfpm:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;
        include fastcgi_params;
        internal;
    }

    # FPM status page proxied through nginx (used by Alloy)
    location = /fpm-status {
        fastcgi_pass phpfpm:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny  all;
    }

    # Nginx stub_status for Alloy metrics scraping
    location = /nginx_status {
        stub_status on;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny  all;
    }

    # Block direct access to any other .php files
    location ~ \.php$ {
        return 404;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
