# Load the brotli modules built in the Dockerfile (main context only).
load_module modules/ngx_http_brotli_filter_module.so;
load_module modules/ngx_http_brotli_static_module.so;

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /run/nginx.pid;


events {
    worker_connections  1024;
}


http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    keepalive_timeout  65;

    # ── Static precompression ────────────────────────────────────────────────
    # Serve the .br / .gz produced by `vite build` (vite-plugin-compression2)
    # straight off disk — best ratio, zero runtime CPU. brotli wins when the
    # client advertises `br`, gzip is the fallback.
    brotli_static  on;
    gzip_static    on;

    # ── Runtime compression (for dynamic responses: API JSON, etc.) ──────────
    brotli              on;
    brotli_comp_level   6;
    brotli_min_length   1024;
    brotli_types        text/plain text/css text/xml
                        application/json application/javascript
                        application/xml application/xml+rss
                        application/rss+xml application/atom+xml
                        font/ttf font/otf image/svg+xml;

    gzip                on;
    gzip_vary           on;
    gzip_proxied        any;
    gzip_comp_level     6;
    gzip_min_length     1024;
    gzip_types          text/plain text/css text/xml
                        application/json application/javascript
                        application/xml application/xml+rss
                        application/rss+xml application/atom+xml
                        font/ttf font/otf image/svg+xml;

    include /etc/nginx/conf.d/*.conf;
}
