[xdebug]
; Set XDEBUG_MODE=develop,debug in the container environment to activate.
; With XDEBUG_MODE=off (the default) Xdebug adds no measurable overhead.
xdebug.mode                = ${XDEBUG_MODE}

; Only start a debug session when the XDEBUG_SESSION cookie / query param is present.
; Use the browser extension or add ?XDEBUG_SESSION=1 to trigger manually.
xdebug.start_with_request  = trigger

; Host machine address — host.docker.internal resolves to the Docker host on Linux/macOS/Windows.
xdebug.client_host         = host.docker.internal
xdebug.client_port         = 9003

xdebug.idekey              = PHPSTORM
xdebug.log                 = /var/www/app/var/log/xdebug.log
xdebug.log_level           = 3
