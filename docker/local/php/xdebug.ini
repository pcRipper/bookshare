[xdebug]
xdebug.mode                = debug
; `trigger`, not `yes`: only start a debug session when explicitly triggered
; (IDE extension / XDEBUG_TRIGGER). With `yes`, every request tried to reach the
; debug client on host.docker.internal:9003 and — when no IDE was listening —
; stalled several seconds per request, which under load tripped the outbound
; HTTP-client timeouts and made the "Ukrainian stores" template search silently
; return empty on the first try. Debugging still works when actually triggered.
xdebug.start_with_request  = trigger
xdebug.client_host         = host.docker.internal
xdebug.client_port         = 9003
xdebug.idekey              = VSCODE
xdebug.log                 = /var/www/app/var/log/xdebug.log
xdebug.log_level           = 3
