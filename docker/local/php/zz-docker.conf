[global]
; Must be "no" in Docker — without this the master process daemonizes (forks
; a background child, then the foreground PID 1 exits cleanly with code 0)
; causing Docker to think the container stopped and restart it endlessly.
daemonize = no

; Route FPM error log to stderr so "docker compose logs" captures it.
error_log = /proc/self/fd/2
log_limit  = 8192

[www]
; Pass host environment variables into FPM worker processes.
; Required for XDEBUG_MODE env var to be visible to PHP.
clear_env = no

; Enable status and ping pages (used by the healthcheck and Alloy).
pm.status_path = /fpm-status
ping.path      = /fpm-ping
ping.response  = pong

; Route worker access log and errors to stderr as well.
access.log              = /proc/self/fd/2
catch_workers_output    = yes
decorate_workers_output = no
