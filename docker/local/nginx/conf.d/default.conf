# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2  on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    root /var/www/app/public;

    # Mercure hub (real-time SSE). Proxied to the Go hub on the internal network;
    # buffering and gzip MUST be off or the event stream gets held back / corrupted.
    # Resolve via Docker's embedded DNS at request time (variable upstream) so a
    # down/restarted hub only 502s SSE instead of failing nginx startup or pinning
    # a stale container IP.
    location /.well-known/mercure {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $mercure_upstream mercure;
        # $request_uri (full original URI incl. ?topic=…) is required with a
        # variable upstream — without it nginx may forward only the path and drop
        # the topic query string, leaving the SSE stream subscribed to nothing.
        proxy_pass http://$mercure_upstream$request_uri;
        proxy_read_timeout 24h;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_buffering off;
        gzip off;
    }

    # API → Symfony front controller
    location /api/ {
        try_files $uri /index.php$is_args$args;
    }

    # Vite-built static assets (JS/CSS/images)
    # brotli_static/gzip_static are enabled globally (nginx.conf): nginx serves
    # the precompressed .br/.gz emitted by `vite build` when the client supports
    # it, falling back to the raw file otherwise.
    location /build/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Server-side cached avatars (and any other localized uploads). Filenames are
    # content-hashed, so the bytes at a given path never change → cache hard.
    location /uploads/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA — all other routes serve the Vue entry point
    location / {
        try_files $uri /build/index.html;
    }

    # PHP-FPM — only index.php is the entry point
    location ~ ^/index\.php(/|$) {
        fastcgi_pass phpfpm:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;
        include fastcgi_params;
        internal;
    }

    # FPM status for Alloy metrics
    location = /fpm-status {
        fastcgi_pass phpfpm:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny  all;
    }

    # Nginx stub_status for Alloy metrics
    location = /nginx_status {
        stub_status on;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny  all;
    }

    location ~ \.php$ { return 404; }
    location ~ /\.(?!well-known).* { deny all; }
}
