[global]
; Must be "no" in Docker — otherwise the master daemonizes, PID 1 exits, and
; Docker restart-loops the container.
daemonize = no

; Route FPM error log to stderr so "docker compose logs" captures it.
error_log = /proc/self/fd/2
log_limit = 8192

[www]
; Pass injected container env vars (DATABASE_URL, APP_SECRET, JWT_PASSPHRASE …)
; through to the worker processes.
clear_env = no

; ── Process manager — tuned for a low-memory droplet ────────────────────────
; ondemand keeps zero idle workers and only forks on incoming requests, then
; reaps them after the idle timeout. Lowest baseline memory footprint.
pm                        = ondemand
pm.max_children           = 5
pm.process_idle_timeout   = 10s
pm.max_requests           = 500

; Ping endpoint for the container healthcheck (not exposed publicly by nginx).
ping.path     = /fpm-ping
ping.response = pong

; Worker stdout/stderr → container logs.
access.log              = /proc/self/fd/2
catch_workers_output    = yes
decorate_workers_output = no
