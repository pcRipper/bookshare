[PHP]
; Fixed production limits — no env-var expansion (immutable image).
memory_limit        = 256M
upload_max_filesize = 50M
post_max_size       = 50M
max_execution_time  = 60
date.timezone       = UTC

; Hardening / hygiene — no debug or version disclosure in production.
expose_php          = Off
display_errors      = Off
display_startup_errors = Off
log_errors          = On
error_log           = /proc/self/fd/2
realpath_cache_size = 4096K
realpath_cache_ttl  = 600

[opcache]
opcache.enable                  = 1
opcache.enable_cli              = 0
; Code is baked into the image and never changes at runtime — disable timestamp
; checks entirely so OPcache never stats files. Big latency win.
opcache.validate_timestamps     = 0
opcache.memory_consumption      = 192
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files   = 20000
opcache.fast_shutdown           = 1
