# ── HTTP :80 — ACME challenge + redirect to HTTPS ───────────────────────────
server {
    listen 80;
    server_name _;

    # Let's Encrypt http-01 webroot challenge (served from the shared volume
    # that the host certbot writes to). Must stay on plain HTTP.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS :443 — the app ─────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2  on;
    server_name _;

    # Fixed cert paths. init-certs.sh writes a self-signed pair here on first
    # boot; the certbot --deploy-hook overwrites them with the real cert and
    # reloads nginx (see DEPLOY.md).
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    root /var/www/app/public;

    # API → Symfony front controller
    location /api/ {
        try_files $uri /index.php$is_args$args;
    }

    # Vite-built static assets (JS/CSS/images). brotli_static/gzip_static
    # (nginx.conf) serve the precompressed .br/.gz when the client supports it.
    location /build/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA — all other routes serve the Vue entry point.
    location / {
        try_files $uri /build/index.html;
    }

    # PHP-FPM — only index.php is the entry point.
    location ~ ^/index\.php(/|$) {
        fastcgi_pass phpfpm:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;
        include fastcgi_params;
        internal;
    }

    location ~ \.php$ { return 404; }
    location ~ /\.(?!well-known).* { deny all; }
}
