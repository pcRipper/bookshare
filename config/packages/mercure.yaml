mercure:
    hubs:
        default:
            url: '%env(MERCURE_URL)%'
            public_url: '%env(MERCURE_PUBLIC_URL)%'
            jwt:
                secret: '%env(MERCURE_JWT_SECRET)%'
                # Symfony may publish to any topic; subscribers are constrained
                # per-user by the cookie minted in MercureRestController.
                publish: '*'
