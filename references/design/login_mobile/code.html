<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>FolioShare - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&amp;family=Work+Sans:wght@400;500;600&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-dim": "#dbdad6",
                    "on-error": "#ffffff",
                    "on-secondary-container": "#5c656d",
                    "inverse-on-surface": "#f2f0ed",
                    "on-secondary": "#ffffff",
                    "background": "#fbf9f5",
                    "tertiary-container": "#765027",
                    "inverse-surface": "#30312e",
                    "surface-container-high": "#eae8e4",
                    "primary": "#274738",
                    "on-primary-fixed": "#002114",
                    "primary-container": "#3e5f4f",
                    "inverse-primary": "#aacfbb",
                    "surface-container-highest": "#e4e2de",
                    "surface-tint": "#446555",
                    "on-background": "#1b1c1a",
                    "outline": "#727974",
                    "surface-container": "#efeeea",
                    "on-tertiary-fixed": "#2c1600",
                    "on-primary-container": "#b3d7c3",
                    "on-error-container": "#93000a",
                    "surface-variant": "#e4e2de",
                    "on-tertiary-container": "#f9c592",
                    "secondary": "#565f67",
                    "primary-fixed": "#c6ebd6",
                    "surface-bright": "#fbf9f5",
                    "on-surface": "#1b1c1a",
                    "surface": "#fbf9f5",
                    "secondary-fixed": "#dae4ed",
                    "outline-variant": "#c1c8c2",
                    "on-tertiary": "#ffffff",
                    "tertiary-fixed-dim": "#f0bd8b",
                    "on-secondary-fixed-variant": "#3f484f",
                    "tertiary": "#5b3912",
                    "secondary-container": "#dae4ed",
                    "on-primary": "#ffffff",
                    "primary-fixed-dim": "#aacfbb",
                    "on-surface-variant": "#414844",
                    "tertiary-fixed": "#ffdcbd",
                    "on-tertiary-fixed-variant": "#623f18",
                    "surface-container-low": "#f5f3ef",
                    "secondary-fixed-dim": "#bec8d1",
                    "on-secondary-fixed": "#141d23",
                    "surface-container-lowest": "#ffffff",
                    "on-primary-fixed-variant": "#2d4d3e",
                    "error-container": "#ffdad6",
                    "error": "#ba1a1a"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "xs": "4px",
                    "sm": "12px",
                    "xl": "80px",
                    "md": "24px",
                    "lg": "48px",
                    "gutter": "24px",
                    "base": "8px",
                    "container-max": "1200px"
            },
            "fontFamily": {
                    "label-md": ["Work Sans"],
                    "headline-lg-mobile": ["Playfair Display"],
                    "body-lg": ["Work Sans"],
                    "label-sm": ["Work Sans"],
                    "headline-xl": ["Playfair Display"],
                    "headline-lg": ["Playfair Display"],
                    "headline-md": ["Playfair Display"],
                    "body-md": ["Work Sans"]
            },
            "fontSize": {
                    "label-md": ["14px", {"lineHeight": "1.4", "letterSpacing": "0.01em", "fontWeight": "500"}],
                    "headline-lg-mobile": ["28px", {"lineHeight": "1.3", "fontWeight": "700"}],
                    "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "label-sm": ["12px", {"lineHeight": "1.2", "letterSpacing": "0.03em", "fontWeight": "600"}],
                    "headline-xl": ["48px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "headline-lg": ["32px", {"lineHeight": "1.3", "fontWeight": "700"}],
                    "headline-md": ["24px", {"lineHeight": "1.4", "fontWeight": "600"}],
                    "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        .paper-border { border: 1px solid #EAE7E0; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface min-h-screen flex flex-col font-body-md text-body-md">
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center px-gutter py-lg">
<div class="w-full max-w-[400px] flex flex-col items-center">
<!-- Branding Header -->
<div class="mb-lg text-center animate-fade-in">
<div class="mb-sm text-primary">
<span class="material-symbols-outlined !text-[48px]" style="font-variation-settings: 'FILL' 1;">auto_stories</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary tracking-tight">FolioShare</h1>
<p class="font-label-md text-label-md text-on-surface-variant mt-2">Welcome back to your curated library.</p>
</div>
<!-- Login Form -->
<form class="w-full bg-surface-container-lowest paper-border p-md rounded-xl shadow-sm space-y-md" onsubmit="return false;" style="transition: 0.8s cubic-bezier(0.16, 1, 0.3, 1); opacity: 1; transform: translateY(0px);">
<!-- Email Field -->
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-1" for="email">Email Address</label>
<input class="w-full px-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg focus:ring-1 focus:ring-primary focus:border-primary transition-all outline-none" id="email" name="email" placeholder="reader@folioshare.com" required="" type="email">
</div>
<!-- Password Field -->
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-1" for="password">Password</label>
<div class="relative">
<input class="w-full px-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg focus:ring-1 focus:ring-primary focus:border-primary transition-all outline-none" id="password" name="password" placeholder="••••••••" required="" type="password">
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Utilities -->
<div class="flex items-center justify-between py-1">
<label class="flex items-center space-x-2 cursor-pointer group">
<input class="w-4 h-4 rounded-sm border-outline-variant text-primary focus:ring-primary" type="checkbox">
<span class="font-label-md text-label-md text-on-surface-variant group-hover:text-primary transition-colors">Remember me</span>
</label>
<a class="font-label-md text-label-md text-primary font-semibold hover:underline" href="#">Forgot?</a>
</div>
<!-- Action Button -->
<button class="w-full py-4 bg-primary text-on-primary font-label-md text-label-md rounded-lg shadow-sm hover:opacity-90 active:scale-[0.98] transition-all" type="submit">
                    Sign In
                </button>
<!-- Divider -->
<div class="relative flex items-center py-sm">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink mx-4 font-label-sm text-label-sm text-on-surface-variant">or continue with</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-sm">
<button class="flex items-center justify-center py-3 bg-surface-container paper-border rounded-lg hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-[20px] text-secondary">google</span>
</button>
<button class="flex items-center justify-center py-3 bg-surface-container paper-border rounded-lg hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-[20px] text-secondary">ios</span>
</button>
</div>
</form>
<!-- Footer Link -->
<p class="mt-lg font-body-md text-body-md text-on-surface-variant text-center">
                New to the community? <br>
<a class="text-primary font-bold hover:underline decoration-2 underline-offset-4" href="#">Create an account</a>
</p>
</div>
</main>
<!-- Background Atmospheric Elements (Subtle Textures) -->
<div class="fixed inset-0 -z-10 pointer-events-none overflow-hidden opacity-30">
<div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] rounded-full bg-primary-fixed blur-[120px]"></div>
<div class="absolute -bottom-[5%] -right-[5%] w-[30%] h-[30%] rounded-full bg-secondary-fixed blur-[100px]"></div>
</div>
<!-- Minimal Footer (from Shared Components) -->
<footer class="bg-surface-container dark:bg-surface-container-highest border-t border-outline-variant dark:border-outline py-lg px-gutter mt-auto">
<div class="max-w-container-max mx-auto flex flex-col items-center space-y-md">
<span class="font-headline-sm text-headline-sm text-primary dark:text-primary-fixed-dim">FolioShare</span>
<div class="flex flex-wrap justify-center gap-x-md gap-y-sm">
<a class="text-on-surface-variant font-label-sm text-label-sm hover:text-primary transition-colors" href="#">About</a>
<a class="text-on-surface-variant font-label-sm text-label-sm hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="text-on-surface-variant font-label-sm text-label-sm hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="text-on-surface-variant font-label-sm text-label-sm hover:text-primary transition-colors" href="#">Help Center</a>
</div>
<p class="font-label-sm text-label-sm text-on-surface-variant text-center">© 2024 FolioShare. Curated for the community.</p>
</div>
</footer>
<script>
        // Simple micro-interaction for the password toggle
        document.querySelector('button[type="button"]')?.addEventListener('click', function() {
            const input = document.getElementById('password');
            const icon = this.querySelector('.material-symbols-outlined');
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                input.type = 'password';
                icon.textContent = 'visibility';
            }
        });

        // Atmospheric entry animation
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.querySelector('form');
            form.style.opacity = '0';
            form.style.transform = 'translateY(20px)';
            
            setTimeout(() => {
                form.style.transition = 'all 0.8s cubic-bezier(0.16, 1, 0.3, 1)';
                form.style.opacity = '1';
                form.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
</body></html>
