<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Login - FolioShare</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com" rel="preconnect">
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect">

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary": "#565f67",
                        "inverse-surface": "#30312e",
                        "primary-fixed": "#c6ebd6",
                        "surface-container-lowest": "#ffffff",
                        "primary": "#274738",
                        "on-primary-fixed-variant": "#2d4d3e",
                        "on-tertiary-fixed-variant": "#623f18",
                        "inverse-primary": "#aacfbb",
                        "on-secondary-fixed": "#141d23",
                        "primary-fixed-dim": "#aacfbb",
                        "outline": "#727974",
                        "on-primary-container": "#b3d7c3",
                        "on-primary": "#ffffff",
                        "on-surface": "#1b1c1a",
                        "secondary-fixed": "#dae4ed",
                        "on-error": "#ffffff",
                        "background": "#fbf9f5",
                        "surface-bright": "#fbf9f5",
                        "error": "#ba1a1a",
                        "secondary-container": "#dae4ed",
                        "on-secondary-container": "#5c656d",
                        "secondary-fixed-dim": "#bec8d1",
                        "surface-tint": "#446555",
                        "on-error-container": "#93000a",
                        "primary-container": "#3e5f4f",
                        "outline-variant": "#c1c8c2",
                        "surface": "#fbf9f5",
                        "on-tertiary-fixed": "#2c1600",
                        "surface-container": "#efeeea",
                        "on-tertiary-container": "#f9c592",
                        "tertiary": "#5b3912",
                        "tertiary-container": "#765027",
                        "error-container": "#ffdad6",
                        "tertiary-fixed-dim": "#f0bd8b",
                        "on-tertiary": "#ffffff",
                        "surface-container-high": "#eae8e4",
                        "tertiary-fixed": "#ffdcbd",
                        "on-secondary-fixed-variant": "#3f484f",
                        "surface-variant": "#e4e2de",
                        "on-primary-fixed": "#002114",
                        "inverse-on-surface": "#f2f0ed",
                        "on-background": "#1b1c1a",
                        "surface-dim": "#dbdad6",
                        "surface-container-low": "#f5f3ef",
                        "on-surface-variant": "#414844",
                        "on-secondary": "#ffffff",
                        "surface-container-highest": "#e4e2de"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "sm": "12px",
                        "xl": "80px",
                        "lg": "48px",
                        "base": "8px",
                        "md": "24px",
                        "container-max": "1200px",
                        "xs": "4px",
                        "gutter": "24px"
                    },
                    "fontFamily": {
                        "headline-md": ["Playfair Display"],
                        "headline-lg": ["Playfair Display"],
                        "label-sm": ["Work Sans"],
                        "headline-lg-mobile": ["Playfair Display"],
                        "label-md": ["Work Sans"],
                        "body-md": ["Work Sans"],
                        "body-lg": ["Work Sans"],
                        "headline-xl": ["Playfair Display"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", { "lineHeight": "1.4", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "1.3", "fontWeight": "700" }],
                        "label-sm": ["12px", { "lineHeight": "1.2", "letterSpacing": "0.03em", "fontWeight": "600" }],

<body class="bg-background text-on-background min-h-screen flex flex-col antialiased">
<!-- TopNavBar Suppressed as per rule: Linear/Transactional intent (Login) -->
<main class="flex-grow flex items-center justify-center p-gutter relative overflow-hidden">
<!-- Subtle Background Accent -->
<div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none opacity-30">
<div class="absolute -top-1/4 -right-1/4 w-1/2 h-1/2 bg-surface-container-high rounded-full blur-3xl mix-blend-multiply"></div>
<div class="absolute -bottom-1/4 -left-1/4 w-1/2 h-1/2 bg-surface-container-high rounded-full blur-3xl mix-blend-multiply"></div>
</div>
<div class="w-full max-w-[440px] bg-surface-container-lowest border border-surface-variant rounded-xl shadow-[0_10px_30px_rgba(35,44,51,0.08)] p-lg relative z-10">
<div class="text-center mb-lg">
<h1 class="font-headline-xl text-headline-xl text-primary mb-xs">FolioShare</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Welcome back. Please sign in to continue.</p>
</div>
<form action="#" class="space-y-md" method="POST">
<div class="space-y-base">
<label class="block font-label-sm text-label-sm text-on-surface" for="email">Email Address</label>
<input autocomplete="email" class="w-full bg-surface-container-lowest border border-outline-variant rounded focus:border-primary focus:ring-1 focus:ring-primary transition-colors py-sm px-sm font-body-md text-body-md text-on-surface placeholder:text-outline" id="email" name="email" placeholder="reader@example.com" required="" type="email">
</div>
<div class="space-y-base">
<div class="flex justify-between items-baseline">
<label class="block font-label-sm text-label-sm text-on-surface" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:underline" href="#">Forgot password?</a>
</div>
<div class="relative">
<input autocomplete="current-password" class="w-full bg-surface-container-lowest border border-outline-variant rounded focus:border-primary focus:ring-1 focus:ring-primary transition-colors py-sm pl-sm pr-10 font-body-md text-body-md text-on-surface placeholder:text-outline" id="password" name="password" placeholder="••••••••" required="" type="password">
<button aria-label="Toggle password visibility" class="absolute inset-y-0 right-0 pr-sm flex items-center text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">visibility</span>
</button>
</div>
</div>
<div class="flex items-center">
<input class="h-4 w-4 rounded border-outline-variant text-primary focus:ring-primary bg-surface-container-lowest cursor-pointer" id="remember-me" name="remember-me" type="checkbox">
<label class="ml-sm block font-body-md text-body-md text-on-surface-variant cursor-pointer" for="remember-me">
                        Remember me
                    </label>
</div>
<button class="w-full bg-primary text-on-primary font-label-md text-label-md py-sm px-md rounded hover:bg-primary-container hover:text-on-primary-container transition-colors duration-200 shadow-sm flex items-center justify-center" type="submit">
                    Sign In
                </button>
</form>
<div class="mt-lg">
<div class="relative">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-sm bg-surface-container-lowest font-label-sm text-label-sm text-on-surface-variant">Or continue with</span>
</div>
</div>
<div class="mt-md grid grid-cols-2 gap-sm">
<button class="flex items-center justify-center w-full px-sm py-sm border border-outline-variant rounded bg-surface-container-lowest hover:bg-surface-container-low transition-colors text-on-surface" type="button">
<!-- Simple generic icon to represent external auth in absence of brand assets -->
<span class="material-symbols-outlined mr-sm" style="font-variation-settings: 'FILL' 0;">public</span>
<span class="font-label-md text-label-md">Google</span>
</button>
<button class="flex items-center justify-center w-full px-sm py-sm border border-outline-variant rounded bg-surface-container-lowest hover:bg-surface-container-low transition-colors text-on-surface" type="button">
<span class="material-symbols-outlined mr-sm" style="font-variation-settings: 'FILL' 0;">devices</span>
<span class="font-label-md text-label-md">Apple</span>
</button>
</div>
</div>
<p class="mt-lg text-center font-body-md text-body-md text-on-surface-variant">Don't have an account? <a class="font-label-md text-label-md text-primary hover:underline" href="#">Sign up</a></p>
</div>
</main>
<!-- Footer Suppressed on purely transactional pages to maintain focus on the login card, though arguably optional. Opting to suppress for cleaner focus. -->


</body></html>
