<!DOCTYPE html><html class="light" lang="en"><head>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .modal-overlay {
            background-color: rgba(20, 29, 35, 0.4);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #bec8d1;

      min-height: max(884px, 100dvh);

<body class="bg-background text-on-surface font-body-md antialiased overflow-hidden">
<!-- Backdrop for the Modal -->
<div class="fixed inset-0 modal-overlay z-40 flex items-end sm:items-center justify-center p-0 sm:p-gutter">
<!-- Modal Container (Bottom Sheet on Mobile) -->
<main class="bg-surface w-full max-w-container-max sm:max-h-[795px] h-[839px] sm:h-auto rounded-t-xl sm:rounded-xl shadow-2xl overflow-hidden flex flex-col transform transition-transform duration-300 translate-y-0 relative z-50 border border-outline-variant">
<!-- Handle for mobile visual cue -->
<div class="w-full flex justify-center py-2 sm:hidden">
<div class="w-12 h-1.5 bg-outline-variant rounded-full"></div>
</div>
<!-- Modal Header -->
<header class="flex justify-between items-center px-gutter py-4 border-b border-outline-variant">
<h1 class="font-headline-md text-headline-md text-primary">Manage Book</h1>
<button aria-label="Close modal" class="p-2 hover:bg-surface-container rounded-full transition-colors">
<span class="material-symbols-outlined text-on-surface-variant">close</span>
</button>
</header>
<!-- Modal Content (Scrollable Area) -->
<div class="flex-1 overflow-y-auto px-gutter py-lg custom-scrollbar">
<form class="space-y-lg max-w-2xl mx-auto">
<!-- Cover Upload Section -->
<div class="flex flex-col sm:flex-row gap-lg items-center sm:items-start">
<div class="w-40 h-60 bg-surface-container-high rounded-lg flex flex-col items-center justify-center border-2 border-dashed border-outline-variant hover:border-primary transition-colors cursor-pointer group shrink-0 overflow-hidden relative">
<img alt="" class="absolute inset-0 w-full h-full object-cover opacity-20 group-hover:scale-105 transition-transform duration-500" data-alt="A clean and artistic book cover placeholder with minimalist geometric patterns in Bookstore Green and Paper White. The lighting is soft and even, highlighting a textured canvas paper material. The overall aesthetic is professional, scholarly, and serene, fitting a high-end digital library application." id="cover-preview" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDeKZeG4Sqajkn7_FStMjRgI3_J8nWMqazdeHN6mGTt9P-qZCrQKuX_Ekq5CjC_aDdiWUz44GMe1D2mW9CpTqjLh9OvNvnTaylUOFsv1XONvq3P0D8sCMJhKUUafj1p4DTpR9ypJ_SwQVvit99nJ-s4h7BhtgnvFYLz6opjs2EBFsf74rHH-ypkx1caKvX8L42rKuVxmriOSWONj_nuIiOh03bqWN7JPKzwGqoab74ikCskxT2GO9ORdBf0mWtenLAA5CaoZbQ9eh8">
<div class="relative z-10 flex flex-col items-center">
<span class="material-symbols-outlined text-primary text-4xl mb-2">add_a_photo</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">Upload Cover</span>
</div>
</div>
<div class="flex-1 space-y-md w-full">
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-1" for="book-title">Book Title</label>
<input class="w-full px-md py-3 rounded-lg border border-outline-variant bg-surface focus:border-primary focus:ring-1 focus:ring-primary transition-all text-body-md font-body-md" id="book-title" placeholder="e.g., The Architecture of Light" type="text" value="The Midnight Library">
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-1" for="author-name">Author</label>
<input class="w-full px-md py-3 rounded-lg border border-outline-variant bg-surface focus:border-primary focus:ring-1 focus:ring-primary transition-all text-body-md font-body-md" id="author-name" placeholder="Author's full name" type="text" value="Matt Haig">
</div>
</div>
</div>
<!-- Details Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-1" for="isbn">ISBN-13</label>
<input class="w-full px-md py-3 rounded-lg border border-outline-variant bg-surface focus:border-primary focus:ring-1 focus:ring-primary transition-all text-body-md font-body-md" id="isbn" placeholder="978-..." type="text" value="978-0525559474">
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-1" for="status">Reading Status</label>
<div class="relative">
<select class="w-full px-md py-3 rounded-lg border border-outline-variant bg-surface focus:border-primary focus:ring-1 focus:ring-primary transition-all appearance-none text-body-md font-body-md" id="status">
<option value="want-to-read">Want to Read</option>
<option selected="" value="reading">Currently Reading</option>
<option value="finished">Finished</option>
<option value="on-hold">On Hold</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">expand_more</span>
</div>
</div>
</div>
<!-- Categories Section -->
<div class="space-y-base">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-1">Categories</label>
<div class="flex flex-wrap gap-2">
<span class="px-4 py-2 rounded-full bg-[#E8F0EA] text-[#1D3528] font-label-md text-label-md flex items-center gap-1 cursor-pointer hover:opacity-80 transition-opacity">
                                Fiction <span class="material-symbols-outlined text-[16px]">close</span>
</span>
<span class="px-4 py-2 rounded-full bg-[#F4EAE0] text-[#3E2D1D] font-label-md text-label-md flex items-center gap-1 cursor-pointer hover:opacity-80 transition-opacity">
                                Fantasy <span class="material-symbols-outlined text-[16px]">close</span>
</span>
<span class="px-4 py-2 rounded-full bg-[#E0E7F4] text-[#1D2B3E] font-label-md text-label-md flex items-center gap-1 cursor-pointer hover:opacity-80 transition-opacity">
                                Philosophy <span class="material-symbols-outlined text-[16px]">close</span>
</span>
<button class="px-4 py-2 rounded-full border border-outline-variant text-on-surface-variant font-label-md text-label-md flex items-center gap-1 hover:border-primary hover:text-primary transition-all" type="button">
<span class="material-symbols-outlined text-[18px]">add</span> Add Category
                            </button>
</div>
</div>
<!-- Description/Notes -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-1" for="notes">Personal Notes</label>
<textarea class="w-full px-md py-3 rounded-lg border border-outline-variant bg-surface focus:border-primary focus:ring-1 focus:ring-primary transition-all text-body-md font-body-md resize-none" id="notes" placeholder="Write your thoughts or a brief summary..." rows="4">A beautiful story about the infinite possibilities of life and the regrets we carry. Deeply philosophical and comforting.</textarea>
</div>
<!-- Settings Toggles -->
<div class="pt-sm space-y-md">
<div class="flex items-center justify-between py-2">
<div>
<h3 class="font-label-md text-label-md text-on-surface">Visible to Community</h3>
<p class="text-label-sm font-label-sm text-on-surface-variant">Allow others to see this book in your library.</p>
</div>
<button class="w-12 h-6 bg-primary rounded-full relative transition-colors duration-200" type="button">
<div class="absolute top-1 left-7 w-4 h-4 bg-white rounded-full transition-all"></div>
</button>
</div>
<div class="flex items-center justify-between py-2">
<div>
<h3 class="font-label-md text-label-md text-on-surface">Open for Lending</h3>
<p class="text-label-sm font-label-sm text-on-surface-variant">Mark this physical copy as available for friends to borrow.</p>
</div>
<button class="w-12 h-6 bg-surface-container-highest rounded-full relative transition-colors duration-200" type="button">
<div class="absolute top-1 left-1 w-4 h-4 bg-white rounded-full transition-all"></div>
</button>
</div>
</div>
</form>
</div>
<!-- Modal Footer -->
<footer class="px-gutter py-md border-t border-outline-variant bg-surface-container-low flex flex-col sm:flex-row gap-md sm:justify-end">
<button class="px-lg py-3 rounded-lg border border-secondary text-secondary font-label-md text-label-md hover:bg-surface-container transition-all active:scale-95 order-2 sm:order-1">
                    Cancel
                </button>
<button class="px-lg py-3 rounded-lg bg-primary text-white font-label-md text-label-md shadow-sm hover:opacity-90 transition-all active:scale-95 order-1 sm:order-2">
                    Save Changes
                </button>
</footer>
</main>
</div>
<!-- Decorative background content (blurred) to show context -->
<div class="fixed inset-0 filter blur-sm pointer-events-none p-gutter">
<div class="max-w-container-max mx-auto space-y-lg opacity-40">
<div class="h-16 bg-surface-container rounded-lg"></div>
<div class="grid grid-cols-4 gap-gutter">
<div class="aspect-[3/4] bg-surface-container-high rounded-lg"></div>
<div class="aspect-[3/4] bg-surface-container-high rounded-lg"></div>
<div class="aspect-[3/4] bg-surface-container-high rounded-lg"></div>
<div class="aspect-[3/4] bg-surface-container-high rounded-lg"></div>
</div>
<div class="h-64 bg-surface-container rounded-lg"></div>
</div>
</div>
<script>
        // Simple toggle interaction for demo
        document.querySelectorAll('button[type="button"]').forEach(btn => {
            if (btn.classList.contains('w-12')) {
                btn.addEventListener('click', () => {
                    const dot = btn.querySelector('div');
                    const isActive = btn.classList.contains('bg-primary');
                    
                    if (isActive) {
                        btn.classList.remove('bg-primary');
                        btn.classList.add('bg-surface-container-highest');
                        dot.classList.remove('left-7');
                        dot.classList.add('left-1');
                    } else {
                        btn.classList.add('bg-primary');
                        btn.classList.remove('bg-surface-container-highest');
                        dot.classList.add('left-7');
                        dot.classList.remove('left-1');
                    }
                });
            }
        });

        // Close button mock interaction
        document.querySelector('button[aria-label="Close modal"]').addEventListener('click', () => {
           const container = document.querySelector('main');
           container.classList.add('translate-y-full');
           setTimeout(() => {
               alert('Modal dismissed in demo');
               container.classList.remove('translate-y-full');
           }, 300);
        });
    </script>
</body></html>
