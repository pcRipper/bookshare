name: bookshare-prod

# Production stack — optimized two-stage images, no dev tooling.
#   • Images are built and pushed to a registry (make prod-build-push); the
#     droplet pulls them (make prod-pull / prod-deploy).
#   • Secrets come from a host .env.prod.local file passed via --env-file
#     (see the Makefile targets and DEPLOY.md).
#   • No Mailpit, no Prometheus/Alloy/Grafana, no Xdebug.

services:

  # ── PHP-FPM ────────────────────────────────────────────────────────────────
  phpfpm:
    image: ${REGISTRY}/bookshare-php:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: docker/production/php/Dockerfile
      args:
        PHP_VERSION: ${PHP_VERSION:-8.4}
    restart: always
    env_file:
      - docker/production/php/app.env        # static prod literals (APP_ENV=prod …)
    environment:
      # Secrets / per-deployment values — sourced from .env.prod.local.
      APP_SECRET: ${APP_SECRET:?set APP_SECRET in .env.prod.local}
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgresql:5432/${POSTGRES_DB:-bookshare}?serverVersion=16&charset=utf8
      JWT_PASSPHRASE: ${JWT_PASSPHRASE:?set JWT_PASSPHRASE in .env.prod.local}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:?set CORS_ALLOW_ORIGIN in .env.prod.local}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?set GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:?set GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:?set GOOGLE_REDIRECT_URI}
      DEFAULT_URI: ${DEFAULT_URI:-https://localhost}
      # Set RUN_MIGRATIONS=0 in .env.prod.local to skip auto-migrate on boot.
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-1}
    volumes:
      # JWT keys live on the droplet (gitignored), mounted read-only.
      - ./config/jwt:/var/www/app/config/jwt:ro
      # Persist uploaded files (avatars, covers) across deployments.
      - app_uploads:/var/www/app/var/share
    healthcheck:
      test: ["CMD-SHELL", "SCRIPT_NAME=/fpm-ping SCRIPT_FILENAME=/fpm-ping REQUEST_METHOD=GET cgi-fcgi -bind -connect 127.0.0.1:9000 | grep -q pong"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgresql:
        condition: service_healthy
    networks:
      - app

  # ── Nginx (TLS terminator + static/SPA server) ──────────────────────────────
  nginx:
    image: ${REGISTRY}/bookshare-nginx:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: docker/production/nginx/Dockerfile
      args:
        NGINX_VERSION: ${NGINX_VERSION:-1.27}
    restart: always
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      # TLS certs (self-signed fallback written here on first boot; replaced by
      # certbot's --deploy-hook). Point TLS_CERT_DIR at a host dir on the droplet.
      - ${TLS_CERT_DIR:-./docker/production/nginx/certs}:/etc/nginx/certs
      # Shared ACME http-01 webroot — host certbot writes challenges here.
      - ${ACME_WEBROOT:-./var/certbot}:/var/www/certbot:ro
    depends_on:
      phpfpm:
        condition: service_healthy
    networks:
      - app

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgresql:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bookshare}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.prod.local}
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB:-bookshare}", "-U", "${POSTGRES_USER:-app}"]
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - postgresql_data:/var/lib/postgresql/data
    # No published host port — the database is only reachable on the internal
    # `app` network.
    networks:
      - app

networks:
  app:
    driver: bridge

volumes:
  postgresql_data:
  app_uploads:
