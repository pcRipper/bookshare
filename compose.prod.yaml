name: bookshare-prod

# Production stack — optimized two-stage images, no dev tooling.
#   • Images are built ON THE SERVER from the git checkout (make prod-build /
#     prod-deploy) and tagged locally — there is no registry, nothing is pushed
#     or pulled. The multi-stage Dockerfiles keep the runtime images slim.
#   • Config comes from the default .env. It is MOUNTED into the phpfpm
#     container (read-only), not baked into the image, so secrets never enter the
#     image layers; Docker Compose also reads it for ${...} substitution. Set
#     APP_ENV=prod and the production values there — there is no separate prod
#     env file.
#   • No Mailpit, no Prometheus/Alloy/Grafana, no Xdebug.

services:

  # ── PHP-FPM ────────────────────────────────────────────────────────────────
  phpfpm:
    # Built locally on the server; tagged for stable reference + pruning.
    image: bookshare-php:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: docker/production/php/Dockerfile
      args:
        PHP_VERSION: ${PHP_VERSION:-8.4}
    restart: always
    environment:
      # The app reads its config (APP_ENV, APP_SECRET, JWT_PASSPHRASE, CORS,
      # GOOGLE_*, DEFAULT_URI …) from the .env mounted below — set APP_ENV=prod
      # and the production values there. Only the two settings below are
      # container-specific and therefore overridden here:
      #
      #   • DATABASE_URL — must target the `postgresql` compose service, not the
      #     host-oriented value in .env. Credentials still come from .env.
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-changeme}@postgresql:5432/${POSTGRES_DB:-bookshare}?serverVersion=16&charset=utf8
      #   • RUN_MIGRATIONS — apply pending migrations on boot (set 0 to skip and
      #     run `make prod-migrate` manually).
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-1}
    volumes:
      # App config — mounted (NOT baked into the image), so secrets stay out of
      # the image layers and a config change needs only a restart, not a rebuild.
      - ./.env:/var/www/app/.env:ro
      # JWT keys live on the droplet (gitignored), mounted read-only.
      - ./config/jwt:/var/www/app/config/jwt:ro
      # Persist localized avatars across deployments AND share them with nginx.
      # AvatarLocalizer writes to public/uploads/avatars and nginx serves
      # /uploads/ from public/ — so the volume must live there and be visible to
      # the nginx container too (mounted read-only below).
      - app_uploads:/var/www/app/public/uploads
    healthcheck:
      test: ["CMD-SHELL", "SCRIPT_NAME=/fpm-ping SCRIPT_FILENAME=/fpm-ping REQUEST_METHOD=GET cgi-fcgi -bind -connect 127.0.0.1:9000 | grep -q pong"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgresql:
        condition: service_healthy
    networks:
      - app

  # ── Nginx (TLS terminator + static/SPA server) ──────────────────────────────
  nginx:
    # Built locally on the server; tagged for stable reference + pruning.
    image: bookshare-nginx:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: docker/production/nginx/Dockerfile
      args:
        NGINX_VERSION: ${NGINX_VERSION:-1.27}
    restart: always
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      # TLS certs (self-signed fallback written here on first boot; replaced by
      # certbot's --deploy-hook). Point TLS_CERT_DIR at a host dir on the droplet.
      - ${TLS_CERT_DIR:-./docker/production/nginx/certs}:/etc/nginx/certs
      # Shared ACME http-01 webroot — host certbot writes challenges here.
      - ${ACME_WEBROOT:-./var/certbot}:/var/www/certbot:ro
      # Localized avatars written by phpfpm — served read-only from here at
      # /uploads/ (same named volume the phpfpm service writes to).
      - app_uploads:/var/www/app/public/uploads:ro
    depends_on:
      phpfpm:
        condition: service_healthy
    networks:
      - app

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgresql:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bookshare}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB:-bookshare}", "-U", "${POSTGRES_USER:-app}"]
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - postgresql_data:/var/lib/postgresql/data
    # No published host port — the database is only reachable on the internal
    # `app` network.
    networks:
      - app

networks:
  app:
    driver: bridge

volumes:
  postgresql_data:
  app_uploads:
